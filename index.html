<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cast Analyzer Pro</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #f2f2f7; font-family: -apple-system, sans-serif; }
        
        .app-table { display: table; width: 100vw; height: 100vh; border-spacing: 0; table-layout: fixed; }
        .controls-row { display: table-row; height: 140px; } /* Iets hoger voor extra knoppen */
        .content-row { display: table-row; height: calc((100vh - 280px) / 3); }
        .spacer-row { display: table-row; height: 140px; background: #f2f2f7; }

        .cell { display: table-cell; width: 100%; vertical-align: middle; border-bottom: 1px solid #ddd; background: #fff; position: relative; }
        .video-cell { background: #000; border-bottom: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Knoppen & Menu */
        .btn-area { padding: 8px; text-align: center; background: #f2f2f7; }
        button { padding: 10px 12px; margin: 2px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 13px; cursor: pointer; }
        #btnConnect { background: #5856d6; } #btnStart { background: #34c759; } #btnStop { background: #ff3b30; } #btnSave { background: #ff9500; }
        .axisBtn { background: #8e8e93; min-width: 35px; } .axisBtn.active { background: #007aff; }
        
        select { padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 13px; width: 60%; margin-top: 5px; }
        .status-text { font-size: 10px; color: #666; margin-top: 4px; }
        #vBack { display: none; }
    </style>
</head>
<body>

<div class="app-table">
    <div class="controls-row">
        <div class="cell btn-area">
            <button id="btnConnect">Connect</button>
            <button id="btnStart" disabled>Start</button>
            <button id="btnStop" disabled>Stop</button>
            <button id="btnSave" disabled>Save</button>
            
            <div class="status-text">Data: <span id="dataCount">0</span> | <span id="dbStatus">DB Ready</span></div>
            
            <select id="archiveSelect">
                <option value="">-- Worp Selecteren --</option>
            </select>
            <button onclick="deleteSession()" style="background:#8e8e93; padding:5px 8px;">Del</button>

            <div style="margin-top:5px;">
                <button id="bX" class="axisBtn active" onclick="setAxis('x')">X</button>
                <button id="bY" class="axisBtn" onclick="setAxis('y')">Y</button>
                <button id="bZ" class="axisBtn" onclick="setAxis('z')">Z</button>
            </div>
        </div>
    </div>

    <div class="content-row"><div class="cell"><canvas id="cAcc"></canvas></div></div>
    <div class="content-row"><div class="cell"><canvas id="cGyro"></canvas></div></div>
    <div class="content-row"><div class="cell video-cell">
        <video id="vLive" playsinline muted autoplay></video>
        <video id="vBack" controls playsinline></video>
    </div></div>
    <div class="spacer-row"><div class="cell" style="background:#f2f2f7; border:none;"></div></div>
</div>

<script>
let char, stream, recorder, db, data = [];
let axis = 'x', chunks = [];

const elLive = document.getElementById('vLive'), elBack = document.getElementById('vBack'), elCount = document.getElementById('dataCount'), archiveSelect = document.getElementById('archiveSelect');

// --- DATABASE LOGICA ---
const dbRequest = indexedDB.open("CastAnalyzerDB", 1);
dbRequest.onupgradeneeded = (e) => {
    e.target.result.createObjectStore("sessions", { keyPath: "id", autoIncrement: true });
};
dbRequest.onsuccess = (e) => { db = e.target.result; loadArchiveList(); };

function loadArchiveList() {
    archiveSelect.innerHTML = '<option value="">-- Worp Selecteren --</option>';
    const store = db.transaction("sessions", "readonly").objectStore("sessions");
    store.openCursor(null, "prev").onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
            const opt = document.createElement("option");
            opt.value = cursor.value.id;
            opt.textContent = cursor.value.name;
            archiveSelect.appendChild(opt);
            cursor.continue();
        }
    };
}

archiveSelect.onchange = () => {
    if (!archiveSelect.value) return;
    db.transaction("sessions", "readonly").objectStore("sessions").get(Number(archiveSelect.value)).onsuccess = (e) => {
        const s = e.target.result;
        data = s.sensorData;
        elBack.src = URL.createObjectURL(s.videoBlob);
        axis = s.axis || 'x';
        elLive.style.display = "none"; elBack.style.display = "block";
        draw();
    };
};

document.getElementById('btnSave').onclick = () => {
    const name = prompt("Naam voor deze worp:", "Worp " + new Date().toLocaleTimeString());
    if (!name) return;
    const session = { name, sensorData: data, videoBlob: new Blob(chunks, { type: 'video/mp4' }), axis, date: new Date() };
    const tx = db.transaction("sessions", "readwrite");
    tx.objectStore("sessions").add(session);
    tx.oncomplete = () => { loadArchiveList(); alert("Opgeslagen!"); };
};

function deleteSession() {
    if (!archiveSelect.value || !confirm("Deze worp verwijderen?")) return;
    const tx = db.transaction("sessions", "readwrite");
    tx.objectStore("sessions").delete(Number(archiveSelect.value));
    tx.oncomplete = () => { loadArchiveList(); elBack.src = ""; draw(); };
}

// --- CORE LOGICA ---
elBack.ontimeupdate = () => draw();

document.getElementById('btnConnect').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ name: "Cast" }], optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214'] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
        char = await service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        elLive.srcObject = stream;
        char.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            data.push({ ax: v.getInt16(0, true) / 100, ay: v.getInt16(2, true) / 100, az: v.getInt16(4, true) / 100, gx: v.getInt16(6, true), gy: v.getInt16(8, true), gz: v.getInt16(10, true) });
            elCount.innerText = data.length;
        });
        document.getElementById('btnConnect').disabled = true; document.getElementById('btnStart').disabled = false;
    } catch (e) { alert(e); }
};

document.getElementById('btnStart').onclick = async () => {
    data = []; chunks = []; elCount.innerText = "0";
    await char.startNotifications();
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
        elLive.style.display = "none"; elBack.style.display = "block";
        elBack.src = URL.createObjectURL(new Blob(chunks, { type: 'video/mp4' }));
        document.getElementById('btnSave').disabled = false;
        setTimeout(draw, 500);
    };
    recorder.start();
    elBack.style.display = "none"; elLive.style.display = "block";
    document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false;
};

document.getElementById('btnStop').onclick = async () => {
    try { await char.stopNotifications(); } catch(e) {}
    recorder.stop();
    document.getElementById('btnStop').disabled = true; document.getElementById('btnStart').disabled = false;
};

function setAxis(a) {
    axis = a;
    document.querySelectorAll('.axisBtn').forEach(b => b.classList.toggle('active', b.id === 'b'+a.toUpperCase()));
    draw();
}

function draw() {
    if (data.length < 2) return;
    let progress = (elBack.duration > 0) ? elBack.currentTime / elBack.duration : 0;
    render("cAcc", data.map(d => d['a' + axis]), "#007aff", "Acc " + axis.toUpperCase(), "m/s2", progress);
    render("cGyro", data.map(d => d['g' + axis]), "#ff3b30", "Gyro " + axis.toUpperCase(), "deg/s", progress);
}

function render(id, points, color, label, unit, progress) {
    const c = document.getElementById(id), ctx = c.getContext('2d'), dpr = window.devicePixelRatio || 2;
    c.width = c.clientWidth * dpr; c.height = c.clientHeight * dpr;
    const w = c.width, h = c.height, pL = w * 0.1, pR = w * 0.1, pT = h * 0.1, pB = h * 0.1, gW = w - pL - pR, gH = h - pT - pB, center = h / 2;
    ctx.clearRect(0, 0, w, h);
    let maxAbs = Math.max(...points.map(Math.abs), 1);
    const scaleY = (gH / 2) / maxAbs;
    ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 1 * dpr;
    for (let i = -4; i <= 4; i++) {
        const y = center - ((maxAbs / 4) * i * scaleY);
        ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(w - pR, y); ctx.stroke();
    }
    ctx.strokeStyle = "#bbb"; ctx.lineWidth = 2 * dpr; ctx.beginPath(); ctx.moveTo(pL, center); ctx.lineTo(w - pR, center); ctx.stroke();
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 4 * dpr; ctx.lineJoin = "round";
    points.forEach((p, i) => {
        const x = pL + (i / (points.length - 1)) * gW, y = center - (p * scaleY);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    if (progress > 0) {
        const cursorX = pL + (progress * gW);
        ctx.strokeStyle = "#ff9500"; ctx.lineWidth = 3 * dpr;
        ctx.beginPath(); ctx.moveTo(cursorX, pT); ctx.lineTo(cursorX, h - pB); ctx.stroke();
    }
    ctx.fillStyle = "#333"; ctx.font = "bold " + (18 * dpr) + "px Arial"; ctx.textAlign = "left"; ctx.fillText(label + " (" + unit + ")", 20, 35 * dpr);
}
</script>
</body>
</html>
