<style>
html, body {
    margin: 0;
    padding: 0;
    background: #f2f2f7;
    font-family: -apple-system, sans-serif;
    height: 100%;
}

.container {
    max-width: 600px; /* Iets smaller voor mobiel */
    margin: 0 auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

h3 { text-align: center; margin: 10px 0; }

/* FIX: Containers met vaste hoogte voor de grafieken */
.chart-container {
    position: relative;
    height: 120px; /* Iets hoger voor de legenda/labels */
    width: 100%;
    margin-bottom: 10px;
    background: white;
    border-radius: 8px;
    padding: 5px;
    box-sizing: border-box;
}

/* Video sectie onderaan */
.video-section {
    width: 100%;
    margin-top: 10px;
}

#videoLive, #videoPlayback {
    width: 100%;
    border-radius: 10px;
    background: black;
    display: block;
}

#videoPlayback { display: none; }

button {
    padding: 10px 15px;
    margin: 5px 2px;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
}

#btnConnect { background: #5856d6; }
#btnStart   { background: #34c759; }
#btnStop    { background: #ff3b30; }
.axisBtn { background: #8e8e93; }
.axisBtn.active { background: #007aff; }
button:disabled { background: #ccc !important; }
</style>

<body>
<div class="container">
    <h3>🎣 Cast Analyzer</h3>

    <div style="text-align:center; margin-bottom:10px;">
        <button id="btnConnect">Connect</button>
        <button id="btnStart" disabled>Start</button>
        <button id="btnStop" disabled>Stop</button>
        <div style="margin-top:5px;">
            <button class="axisBtn active" id="btnX" onclick="setAxis('x')">X</button>
            <button class="axisBtn" id="btnY" onclick="setAxis('y')">Y</button>
            <button class="axisBtn" id="btnZ" onclick="setAxis('z')">Z</button>
        </div>
    </div>

    <!-- GRAFIEKEN BOVEN -->
    <div class="chart-container">
        <canvas id="chartAcc"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="chartGyro"></canvas>
    </div>

    <!-- VIDEO ONDER -->
    <div class="video-section">
        <video id="videoLive" playsinline muted></video>
        <video id="videoPlayback" controls></video>
    </div>
</div>
