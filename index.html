<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cast Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: -apple-system, sans-serif;
    text-align: center;
    padding: 20px;
    background: #f2f2f7;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

video {
    width: 100%;
    border-radius: 10px;
    background: black;
}

button {
    padding: 10px 18px;
    margin: 5px;
    font-size: 14px;
    border: none;
    border-radius: 10px;
    color: white;
}

#btnConnect { background: #5856d6; }
#btnStart   { background: #34c759; }
#btnStop    { background: #ff3b30; }

.axisBtn {
    background: #007aff;
}

button:disabled { background: #aaa !important; }
</style>
</head>

<body>

<div class="container">

<h2>🎣 Cast Analyzer</h2>

<video id="video" playsinline muted></video>

<br><br>

<button id="btnConnect">1. Koppel Sensor</button>
<button id="btnStart" disabled>2. Start Opname</button>
<button id="btnStop" disabled>3. Stop</button>

<br><br>

<b>As keuze:</b><br>
<button class="axisBtn" onclick="setAxis('x')">X</button>
<button class="axisBtn" onclick="setAxis('y')">Y</button>
<button class="axisBtn" onclick="setAxis('z')">Z</button>

<br><br>

<canvas id="chart"></canvas>

</div>

<script>

let device, char, stream, recorder;

let videoChunks = [];
let sensorData = [];

let startTime = 0;
let isRecording = false;

let currentAxis = 'x';
let chart;

const video = document.getElementById('video');
const btnConnect = document.getElementById('btnConnect');
const btnStart = document.getElementById('btnStart');
const btnStop = document.getElementById('btnStop');

// =====================
// CONNECT
// =====================
btnConnect.onclick = async () => {

    device = await navigator.bluetooth.requestDevice({
        filters: [{ name: "Cast" }],
        optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214']
    });

    const server = await device.gatt.connect();
    const service = await server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
    char = await service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');

    await char.readValue();

    btnConnect.disabled = true;

    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
    });

    video.srcObject = stream;
    await video.play();

    btnStart.disabled = false;
};

// =====================
// START
// =====================
btnStart.onclick = async () => {

    sensorData = [];
    videoChunks = [];

    startTime = Date.now();
    isRecording = true;

    recorder = new MediaRecorder(stream, {
        mimeType: 'video/webm'
    });

    recorder.ondataavailable = e => {
        if (e.data.size > 0) videoChunks.push(e.data);
    };

    recorder.start();

    video.pause();
    video.srcObject = null;

    char.addEventListener('characteristicvaluechanged', handleData);
    await char.startNotifications();

    btnStart.disabled = true;
    btnStop.disabled = false;
};

// =====================
// DATA
// =====================
function handleData(e) {

    const v = e.target.value;

    sensorData.push({
        t: Date.now() - startTime,
        ax: v.getInt16(0, true) / 100,
        ay: v.getInt16(2, true) / 100,
        az: v.getInt16(4, true) / 100,
        gx: v.getInt16(6, true),
        gy: v.getInt16(8, true),
        gz: v.getInt16(10, true)
    });
}

// =====================
// STOP
// =====================
btnStop.onclick = () => {

    if (!isRecording) return;

    isRecording = false;

    recorder.stop();
    char.stopNotifications();

    recorder.onstop = () => {

        const blob = new Blob(videoChunks, { type: 'video/webm' });

        video.src = URL.createObjectURL(blob);
        video.controls = true;
        video.play();

        btnStop.disabled = true;
        btnStart.disabled = false;

        drawChart();
    };
};

// =====================
// CHART
// =====================
function drawChart() {

    const labels = sensorData.map(d => d.t);

    let accData, gyroData;

    if (currentAxis === 'x') {
        accData = sensorData.map(d => d.ax);
        gyroData = sensorData.map(d => d.gx);
    }
    if (currentAxis === 'y') {
        accData = sensorData.map(d => d.ay);
        gyroData = sensorData.map(d => d.gy);
    }
    if (currentAxis === 'z') {
        accData = sensorData.map(d => d.az);
        gyroData = sensorData.map(d => d.gz);
    }

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Acceleratie',
                    data: accData
                },
                {
                    label: 'Gyro',
                    data: gyroData
                }
            ]
        },
        options: {
            responsive: true,
            animation: false,
            scales: {
                x: { title: { display: true, text: 'tijd (ms)' } },
                y: { title: { display: true, text: 'waarde' } }
            }
        }
    });
}

// =====================
// AXIS SWITCH
// =====================
function setAxis(axis) {
    currentAxis = axis;
    drawChart();
}

</script>

</body>
</html>
