<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<title>Cast Analyzer</title>

<style>
/* ====== LAYOUT FIX: alles past nu in 1 scherm ====== */

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* geen scrollen */
    background: #f2f2f7;
    font-family: -apple-system, sans-serif;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100vh; /* volledige schermhoogte */
}

/* Controls bovenaan, nemen weinig ruimte */
.controls {
    padding: 8px;
    text-align: center;
}

/* Grafieken bovenaan */
#chartAcc {
    flex: 0 0 30vh; /* 30% van scherm */
}

#chartGyro {
    flex: 0 0 30vh; /* 30% van scherm */
}

/* Video onderaan */
#video {
    flex: 0 0 40vh; /* 40% van scherm */
    width: 100%;
    object-fit: cover;
    background: black;
    border-radius: 10px;
}

/* Buttons */
button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 15px;
}

#btnConnect { background: #5856d6; }
#btnStart   { background: #34c759; }
#btnStop    { background: #ff3b30; }

.axisBtn { background: #8e8e93; }
.axisBtn.active { background: #007aff; }

button:disabled { background: #aaa !important; }
</style>
</head>

<body>

<div class="container">

    <div class="controls">
        <h3>🎣 Cast Analyzer</h3>

        <button id="btnConnect">Connect</button>
        <button id="btnStart" disabled>Start</button>
        <button id="btnStop" disabled>Stop</button>

        <br>

        <button class="axisBtn active" id="btnX" onclick="setAxis('x')">X</button>
        <button class="axisBtn" id="btnY" onclick="setAxis('y')">Y</button>
        <button class="axisBtn" id="btnZ" onclick="setAxis('z')">Z</button>
    </div>

    <canvas id="chartAcc"></canvas>
    <canvas id="chartGyro"></canvas>

    <video id="video" playsinline muted></video>

</div>

<script>
/* ====== ORIGINELE LOGICA — NIETS AANGEPAST ====== */

let device, char, stream, recorder;
let sensorData = [];
let videoChunks = [];
let startTime = 0;
let isRecording = false;
let axis = 'x';
let chartAcc, chartGyro;

const video      = document.getElementById('video');
const btnConnect = document.getElementById('btnConnect');
const btnStart   = document.getElementById('btnStart');
const btnStop    = document.getElementById('btnStop');

// =====================
// CONNECT
// =====================
btnConnect.onclick = async () => {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "Cast" }],
            optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214']
        });

        const server  = await device.gatt.connect();
        const service = await server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
        char          = await service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');

        await char.readValue();

        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
        });

        video.srcObject   = stream;
        video.playsInline = true;
        video.muted       = true;
        await video.play();

        btnConnect.disabled = true;
        btnStart.disabled   = false;
    } catch (e) {
        alert("Connect failed: " + e);
    }
};

// =====================
// START
// =====================
btnStart.onclick = async () => {
    try {
        sensorData  = [];
        videoChunks = [];

        startTime   = Date.now();
        isRecording = true;

        recorder = new MediaRecorder(stream, {
            mimeType: 'video/mp4; codecs="avc1.42E01E"'
        });

        recorder.ondataavailable = e => {
            if (e.data.size > 0) videoChunks.push(e.data);
        };

        recorder.start();

        video.style.display = "none";

        char.addEventListener('characteristicvaluechanged', onData);
        await char.startNotifications();

        btnStart.disabled = true;
        btnStop.disabled  = false;
    } catch (e) {
        alert("Start failed: " + e);
    }
};

// =====================
// DATA
// =====================
function onData(e) {
    const v = e.target.value;

    sensorData.push({
        t:  Date.now() - startTime,
        ax: v.getInt16(0,  true) / 100,

        az: v.getInt16(4,  true) / 100,
        gx: v.getInt16(6,  true),
        gy
