<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cast Analyzer</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    text-align: center;
    padding: 20px;
    background: #f2f2f7;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

video {
    width: 100%;
    border-radius: 10px;
    background: black;
}

button {
    padding: 15px 25px;
    margin: 5px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    color: white;
}

#btnConnect { background: #5856d6; }
#btnStart   { background: #34c759; }
#btnStop    { background: #ff3b30; }

button:disabled { background: #aaa !important; }
</style>
</head>

<body>

<div class="container">

<h2>🎣 Cast Analyzer</h2>

<video id="video" playsinline muted></video>

<br><br>

<button id="btnConnect">1. Koppel Sensor</button>
<button id="btnStart" disabled>2. Start Opname</button>
<button id="btnStop" disabled>3. Stop</button>

</div>

<script>

let device, char, stream, recorder;

let videoChunks = [];
let sensorData = [];

let startTime = 0;
let isRecording = false;

const video = document.getElementById('video');
const btnConnect = document.getElementById('btnConnect');
const btnStart = document.getElementById('btnStart');
const btnStop = document.getElementById('btnStop');

// CONNECT
btnConnect.onclick = async () => {

    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "Cast" }],
            optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214']
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
        char = await service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');

        // 🔥 iOS trigger
        await char.readValue();

        btnConnect.disabled = true;

        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
        });

        video.srcObject = stream;
        await video.play();

        btnStart.disabled = false;

        alert("Sensor gekoppeld + camera klaar");

    } catch (e) {
        alert("FOUT: " + e.message);
    }
};

// START
btnStart.onclick = async () => {

    sensorData = [];
    videoChunks = [];

    startTime = Date.now();
    isRecording = true;

    recorder = new MediaRecorder(stream, {
        mimeType: 'video/webm'
    });

    recorder.ondataavailable = e => {
        if (e.data.size > 0) videoChunks.push(e.data);
    };

    recorder.start();

    video.pause();
    video.srcObject = null;

    await char.startNotifications();

    char.oncharacteristicvaluechanged = (e) => {

        const v = e.target.value;

        sensorData.push({
            t: Date.now() - startTime,
            ax: v.getInt16(0, true) / 100,
            ay: v.getInt16(2, true) / 100,
            az: v.getInt16(4, true) / 100,
            gx: v.getInt16(6, true),
            gy: v.getInt16(8, true),
            gz: v.getInt16(10, true)
        });
    };

    btnStart.disabled = true;
    btnStop.disabled = false;
};

// STOP
btnStop.onclick = () => {

    if (!isRecording) return;

    isRecording = false;

    recorder.stop();
    char.stopNotifications();

    recorder.onstop = () => {

        const blob = new Blob(videoChunks, { type: 'video/webm' });

        video.src = URL.createObjectURL(blob);
        video.controls = true;
        video.play();

        alert("Opname klaar\nSensorpunten: " + sensorData.length);

        btnStop.disabled = true;
        btnStart.disabled = false;

        console.log(sensorData);
    };
};

</script>

</body>
</html>
