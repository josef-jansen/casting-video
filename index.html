<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cast Analyzer</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #f2f2f7; font-family: sans-serif; }
        .app { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        
        .controls { flex: 0 0 auto; text-align: center; margin-bottom: 10px; }
        button { padding: 12px 20px; margin: 4px; border: none; border-radius: 10px; color: white; font-weight: bold; }
        #btnConnect { background: #5856d6; }
        #btnStart { background: #34c759; }
        #btnStop { background: #ff3b30; }
        .axisBtn { background: #8e8e93; min-width: 50px; }
        .axisBtn.active { background: #007aff; }
        button:disabled { background: #ccc !important; }

        .charts { flex: 0 0 auto; display: flex; flex-direction: column; gap: 8px; }
        .chart-box { height: 125px; background: white; border-radius: 12px; padding: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .video-container { flex: 1; margin-top: 10px; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div class="app">
    <div class="controls">
        <button id="btnConnect">Connect</button>
        <button id="btnStart" disabled>Start</button>
        <button id="btnStop" disabled>Stop</button>
        <div style="margin-top:5px;">
            <button class="axisBtn active" onclick="setAxis('x')">X</button>
            <button class="axisBtn" onclick="setAxis('y')">Y</button>
            <button class="axisBtn" onclick="setAxis('z')">Z</button>
        </div>
    </div>

    <div class="charts">
        <div class="chart-box"><canvas id="chartAcc"></canvas></div>
        <div class="chart-box"><canvas id="chartGyro"></canvas></div>
    </div>

    <div class="video-container">
        <video id="videoLive" playsinline muted></video>
        <video id="videoPlayback" controls playsinline></video>
    </div>
</div>

<script>
let device, char, stream, recorder, chartAcc, chartGyro;
let sensorData = [];
let videoChunks = [];
let startTime = 0;
let axis = 'x';

const vLive = document.getElementById('videoLive');
const vBack = document.getElementById('videoPlayback');

document.getElementById('btnConnect').onclick = async () => {
    try {
        device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "Cast" }],
            optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214']
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
        char = await service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');
        
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        vLive.srcObject = stream;
        vLive.play();

        document.getElementById('btnConnect').disabled = true;
        document.getElementById('btnStart').disabled = false;
    } catch (e) { alert(e); }
};

document.getElementById('btnStart').onclick = async () => {
    sensorData = []; videoChunks = [];
    startTime = Date.now();
    
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => videoChunks.push(e.data);
    recorder.start();

    vBack.style.display = "none";
    vLive.style.display = "block";

    char.addEventListener('characteristicvaluechanged', (e) => {
        const v = e.target.value;
        sensorData.push({
            t: Date.now() - startTime,
            ax: v.getInt16(0, true) / 100,
            ay: v.getInt16(2, true) / 100,
            az: v.getInt16(4, true) / 100,
            gx: v.getInt16(6, true),
            gy: v.getInt16(8, true),
            gz: v.getInt16(10, true)
        });
    });
    await char.startNotifications();

    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
};

document.getElementById('btnStop').onclick = async () => {
    await char.stopNotifications();
    recorder.stop();
    recorder.onstop = () => {
        vLive.style.display = "none";
        vBack.style.display = "block";
        vBack.src = URL.createObjectURL(new Blob(videoChunks, { type: 'video/mp4' }));
        draw();
        document.getElementById('btnStop').disabled = true;
        document.getElementById('btnStart').disabled = false;
    };
};

function setAxis(a) {
    axis = a;
    document.querySelectorAll('.axisBtn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === a));
    draw();
}

function draw() {
    if (!sensorData.length) return;
    
    const t = sensorData.map(d => (d.t / 1000).toFixed(2));
    let acc, gyro;

    if (axis === 'x') { acc = sensorData.map(d => d.ax); gyro = sensorData.map(d => d.gx); }
    else if (axis === 'y') { acc = sensorData.map(d => d.ay); gyro = sensorData.map(d => d.gy); }
    else { acc = sensorData.map(d => d.az); gyro = sensorData.map(d => d.gz); }

    if (chartAcc) chartAcc.destroy();
    if (chartGyro) chartGyro.destroy();

    const opt = { responsive: true, maintainAspectRatio: false, animation: false };

    chartAcc = new Chart(document.getElementById('chartAcc'), {
        type: 'line',
        data: { labels: t, datasets: [{ label: 'Acc ' + axis.toUpperCase(), data: acc, borderColor: '#007aff', pointRadius: 0 }] },
        options: opt
    });
    chartGyro = new Chart(document.getElementById('chartGyro'), {
        type: 'line',
        data: { labels: t, datasets: [{ label: 'Gyro ' + axis.toUpperCase(), data: gyro, borderColor: '#ff3b30', pointRadius: 0 }] },
        options: opt
    });
}
</script>
</body>
</html>
