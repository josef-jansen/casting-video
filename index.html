<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cast Analyzer - Sync Scan</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            overflow: hidden; background: #fff; font-family: -apple-system, sans-serif; 
        }
        .controls { 
            position: absolute; top: 0; left: 0; width: 100%; height: 110px;
            padding: 10px; text-align: center; background: #f2f2f7; border-bottom: 1px solid #ddd; z-index: 10;
        }
        :root { --bottom-gap: 100px; --content-h: calc((100vh - 110px - var(--bottom-gap)) / 3); }
        .section { position: absolute; left: 0; width: 100%; height: var(--content-h); border-bottom: 1px solid #eee; overflow: hidden; }
        .chart1 { top: 110px; }
        .chart2 { top: calc(110px + var(--content-h)); }
        .video-container { top: calc(110px + 2 * var(--content-h)); background: #000; display: flex; justify-content: center; border-bottom: none; }
        .safety-buffer { position: absolute; bottom: 0; left: 0; width: 100%; height: var(--bottom-gap); background: #f2f2f7; z-index: 5; }
        canvas { width: 100% !important; height: 100% !important; display: block; }
        video { height: 100%; max-width: 100%; object-fit: contain; }
        button { padding: 10px 14px; margin: 2px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 13px; cursor: pointer; }
        #btnConnect { background: #5856d6; } #btnStart { background: #34c759; } #btnStop { background: #ff3b30; }
        .axisBtn { background: #8e8e93; min-width: 40px; }
        .axisBtn.active { background: #007aff; }
        #vBack { display: none; }
    </style>
</head>
<body>
    <div class="controls">
        <button id="btnConnect">Connect</button>
        <button id="btnStart" disabled>Start</button>
        <button id="btnStop" disabled>Stop</button>
        <div style="font-size:10px; color:#666; margin:4px;">Data: <span id="dataCount">0</span></div>
        <div>
            <button id="bX" class="axisBtn active" onclick="setAxis('x')">X</button>
            <button id="bY" class="axisBtn" onclick="setAxis('y')">Y</button>
            <button id="bZ" class="axisBtn" onclick="setAxis('z')">Z</button>
        </div>
    </div>

    <div class="section chart1"><canvas id="cAcc"></canvas></div>
    <div class="section chart2"><canvas id="cGyro"></canvas></div>
    <div class="section video-container">
        <video id="vLive" playsinline muted autoplay></video>
        <video id="vBack" controls playsinline></video>
    </div>
    <div class="safety-buffer"></div>

<script>
let char, stream, recorder, data = [];
let axis = 'x';
let chunks = [];

const elLive = document.getElementById('vLive');
const elBack = document.getElementById('vBack');
const elCount = document.getElementById('dataCount');

// Sync listener voor de video loper
elBack.addEventListener('timeupdate', () => {
    if (elBack.duration > 0) {
        draw(); // Teken grafieken opnieuw met loper positie
    }
});

document.getElementById('btnConnect').onclick = async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: "Cast" }],
            optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214']
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214');
        char = await service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214');
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        elLive.srcObject = stream;
        char.addEventListener('characteristicvaluechanged', (e) => {
            const v = e.target.value;
            data.push({
                ax: v.getInt16(0, true) / 100, ay: v.getInt16(2, true) / 100, az: v.getInt16(4, true) / 100,
                gx: v.getInt16(6, true), gy: v.getInt16(8, true), gz: v.getInt16(10, true)
            });
            elCount.innerText = data.length;
        });
        document.getElementById('btnConnect').disabled = true;
        document.getElementById('btnStart').disabled = false;
    } catch (e) { alert(e); }
};

document.getElementById('btnStart').onclick = async () => {
    data = []; chunks = []; elCount.innerText = "0";
    await char.startNotifications();
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
        elLive.style.display = "none"; elBack.style.display = "block";
        elBack.src = URL.createObjectURL(new Blob(chunks, { type: 'video/mp4' }));
        setTimeout(draw, 500); // Wacht even tot video geladen is
    };
    recorder.start();
    elBack.style.display = "none"; elLive.style.display = "block";
    document.getElementById('btnStart').disabled = true; document.getElementById('btnStop').disabled = false;
};

document.getElementById('btnStop').onclick = async () => {
    try { await char.stopNotifications(); } catch(e) {}
    recorder.stop();
    document.getElementById('btnStop').disabled = true; document.getElementById('btnStart').disabled = false;
};

function setAxis(a) {
    axis = a;
    document.querySelectorAll('.axisBtn').forEach(b => b.classList.toggle('active', b.id === 'b'+a.toUpperCase()));
    draw();
}

function draw() {
    if (data.length < 2) return;
    
    // Bereken huidige voortgang video (0.0 tot 1.0)
    let progress = 0;
    if (elBack.duration > 0) {
        progress = elBack.currentTime / elBack.duration;
    }

    render("cAcc", data.map(d => d['a' + axis]), "#007aff", "Versnelling " + axis.toUpperCase(), "m/s\u00B2", progress);
    render("cGyro", data.map(d => d['g' + axis]), "#ff3b30", "Rotatie " + axis.toUpperCase(), "\u00B0/s", progress);
}

function render(id, points, color, label, unit, progress) {
    const c = document.getElementById(id);
    const ctx = c.getContext('2d');
    const dpr = window.devicePixelRatio || 2;
    c.width = c.clientWidth * dpr; c.height = c.clientHeight * dpr;
    const w = c.width, h = c.height;
    const paddingLeft = w * 0.1, paddingRight = w * 0.1, paddingTop = h * 0.1, paddingBottom = h * 0.1;
    const graphW = w - paddingLeft - paddingRight, graphH = h - paddingTop - paddingBottom;
    const center = h / 2;

    ctx.clearRect(0, 0, w, h);

    let maxAbs = Math.max(...points.map(Math.abs));
    if (maxAbs < 0.1) maxAbs = 1;
    const scaleY = (graphH / 2) / maxAbs;

    // Raster
    ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 1 * dpr; ctx.fillStyle = "#999";
    ctx.font = (12 * dpr) + "px Arial"; ctx.textAlign = "right";
    const steps = 4; 
    for (let i = -steps; i <= steps; i++) {
        const val = (maxAbs / steps) * i;
        const y = center - (val * scaleY);
        ctx.beginPath(); ctx.moveTo(paddingLeft, y); ctx.lineTo(w - paddingRight, y); ctx.stroke();
        ctx.fillText(val.toFixed(1), paddingLeft - 10, y + (4 * dpr));
    }

    // X-as
    ctx.strokeStyle = "#bbb"; ctx.lineWidth = 2 * dpr;
    ctx.beginPath(); ctx.moveTo(paddingLeft, center); ctx.lineTo(w - paddingRight, center); ctx.stroke();

    // Data lijn
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 3 * dpr; ctx.lineJoin = "round";
    points.forEach((p, i) => {
        const x = paddingLeft + (i / (points.length - 1)) * graphW;
        const y = center - (p * scaleY);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // DE LOPER (Synchronisatie lijn)
    if (progress > 0) {
        const cursorX = paddingLeft + (progress * graphW);
        const dataIdx = Math.floor(progress * (points.length - 1));
        const cursorY = center - (points[dataIdx] * scaleY);

        // Verticale lijn
        ctx.strokeStyle = "#ff9500"; 
        ctx.lineWidth = 2 * dpr;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(cursorX, paddingTop); ctx.lineTo(cursorX, h - paddingBottom); ctx.stroke();
        ctx.setLineDash([]); // Reset dash

        // Bolletje op de lijn
        ctx.fillStyle = "#ff9500";
        ctx.beginPath();
        ctx.arc(cursorX, cursorY, 6 * dpr, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2 * dpr;
        ctx.stroke();
    }

    // Label
    ctx.fillStyle = "#333"; ctx.font = "bold " + (16 * dpr) + "px Arial"; ctx.textAlign = "left";
    ctx.fillText(label + " (" + unit + ")", 20, 30 * dpr);
}
</script>
</body>
</html>
